<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/marcelo.png">
    <link rel="apple-touch-icon" href="/images/marcelo.png">
    <title>Marcelo Cagara | Full Stack Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg)',
                        ink: 'var(--ink)',
                        'gray-50': 'var(--gray-50)',
                        'gray-100': 'var(--gray-100)',
                        'gray-200': 'var(--gray-200)',
                        'gray-300': 'var(--gray-300)',
                        'gray-400': 'var(--gray-400)',
                        'gray-500': 'var(--gray-500)',
                    },
                    fontFamily: {
                        sans: ['Geist', 'system-ui', 'sans-serif'],
                        mono: ['Geist Mono', 'ui-monospace', 'monospace'],
                        pixel: ['"Geist Pixel"', 'Geist Mono', 'monospace'],
                        serif: ['"Source Serif 4"', 'Georgia', 'serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 22px -14px var(--shadow-color)',
                        'soft-hover': '0 18px 36px -20px var(--shadow-color-hover)',
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'Geist Pixel';
            src: url('https://cdn.jsdelivr.net/npm/geist@1.7.0/dist/fonts/geist-pixel/GeistPixel-Square.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* View Transitions circular reveal */
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::view-transition-old(root) {
            z-index: 1;
        }

        ::view-transition-new(root) {
            z-index: 9999;
            animation: vt-circle-reveal 0.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes vt-circle-reveal {
            from {
                clip-path: circle(0% at var(--vt-x, 50%) var(--vt-y, 50%));
            }
            to {
                clip-path: circle(150vmax at var(--vt-x, 50%) var(--vt-y, 50%));
            }
        }

        :root {
            --bg: #ffffff;
            --ink: #0a0a0a;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e9e9e9;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --dot-color: rgba(10, 10, 10, 0.12);
            --shadow-color: rgba(0, 0, 0, 0.06);
            --shadow-color-hover: rgba(0, 0, 0, 0.12);
        }

        :root.dark {
            --bg: #0c0c0f;
            --ink: #f4f4f5;
            --gray-50: #18181b;
            --gray-100: #1e1e22;
            --gray-200: #2a2a30;
            --gray-300: #3a3a42;
            --gray-400: #8a8a92;
            --gray-500: #a0a0a8;
            --dot-color: rgba(244, 244, 245, 0.42);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-color-hover: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Geist', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease;
        }

        /* Halftone Accent Pattern */
        .halftone-accent {
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 7px 7px;
            -webkit-mask-image: radial-gradient(ellipse at bottom right, black 0%, transparent 70%);
            mask-image: radial-gradient(ellipse at bottom right, black 0%, transparent 70%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }

        /* Smooth Page Transition Animation */
        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            opacity: 0;
            animation: pageEnter 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }


        .scroll-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Mobile Nav content animation */
        .mnav-group {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .menu-active .mnav-group {
            opacity: 1;
            transform: translateY(0);
        }
        .mnav-group-1 { transition-delay: 50ms; }
        .mnav-group-2 { transition-delay: 120ms; }
        .mnav-group-3 { transition-delay: 190ms; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3"
      }
    }
    </script>
</head>

<body class="selection:bg-ink selection:text-background">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>


</body>

</html>
