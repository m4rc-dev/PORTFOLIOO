<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/marcelo.png">
    <link rel="apple-touch-icon" href="/images/marcelo.png">
    <title>Marcelo Cagara | Full Stack Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg)',
                        ink: 'var(--ink)',
                        'gray-50': 'var(--gray-50)',
                        'gray-100': 'var(--gray-100)',
                        'gray-200': 'var(--gray-200)',
                        'gray-300': 'var(--gray-300)',
                        'gray-400': 'var(--gray-400)',
                        'gray-500': 'var(--gray-500)',
                    },
                    fontFamily: {
                        sans: ['Geist', 'system-ui', 'sans-serif'],
                        mono: ['Geist Mono', 'ui-monospace', 'monospace'],
                        pixel: ['"Geist Pixel"', 'Geist Mono', 'monospace'],
                        serif: ['"Source Serif 4"', 'Georgia', 'serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 22px -14px var(--shadow-color)',
                        'soft-hover': '0 18px 36px -20px var(--shadow-color-hover)',
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'Geist Pixel';
            src: url('https://cdn.jsdelivr.net/npm/geist@1.7.0/dist/fonts/geist-pixel/GeistPixel-Square.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* View Transitions circular reveal */
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::view-transition-old(root) {
            z-index: 1;
        }

        ::view-transition-new(root) {
            z-index: 9999;
            animation: vt-circle-reveal 0.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes vt-circle-reveal {
            from {
                clip-path: circle(0% at var(--vt-x, 50%) var(--vt-y, 50%));
            }
            to {
                clip-path: circle(150vmax at var(--vt-x, 50%) var(--vt-y, 50%));
            }
        }

        :root {
            --bg: #ffffff;
            --ink: #0a0a0a;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e9e9e9;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --dot-color: rgba(10, 10, 10, 0.12);
            --shadow-color: rgba(0, 0, 0, 0.06);
            --shadow-color-hover: rgba(0, 0, 0, 0.12);
        }

        :root.dark {
            --bg: #0c0c0f;
            --ink: #f4f4f5;
            --gray-50: #18181b;
            --gray-100: #1e1e22;
            --gray-200: #2a2a30;
            --gray-300: #3a3a42;
            --gray-400: #8a8a92;
            --gray-500: #a0a0a8;
            --dot-color: rgba(244, 244, 245, 0.42);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-color-hover: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Geist', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease;
        }

        /* Halftone Accent Pattern */
        .halftone-accent {
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 7px 7px;
            -webkit-mask-image: radial-gradient(ellipse at bottom right, black 0%, transparent 70%);
            mask-image: radial-gradient(ellipse at bottom right, black 0%, transparent 70%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }

        /* Smooth Page Transition Animation */
        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            opacity: 0;
            animation: pageEnter 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }


        .scroll-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Mobile Nav content animation */
        .mnav-group {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .menu-active .mnav-group {
            opacity: 1;
            transform: translateY(0);
        }
        .mnav-group-1 { transition-delay: 50ms; }
        .mnav-group-2 { transition-delay: 120ms; }
        .mnav-group-3 { transition-delay: 190ms; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3"
      }
    }
    </script>
</head>

<body class="selection:bg-ink selection:text-background">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <!-- Custom AI Chat Widget -->
    <div class="ai-chat-widget">
        <button id="ai-chat-button" class="chat-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>Chat with Marcelo</span>
        </button>

        <div id="ai-chat-window" class="chat-window">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="avatar">
                        <img src="/images/marcelo.png?v=1" alt="Marcelo's Assistant">
                    </div>
                    <div class="chat-title">
                        <h3>Marcelo's Assistant</h3>
                        <div class="status">
                            <span class="status-dot"></span>
                            Online
                        </div>
                    </div>
                </div>
                <button id="chat-close" class="chat-close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be added here via JS -->
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask about Marcelo..." autocomplete="off">
                <button id="chat-send" class="send-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <style>
        /* AI Chat Widget Styles */
        .ai-chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            font-family: 'Geist', system-ui, sans-serif;
        }

        .chat-button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--ink);
            color: var(--bg);
            border: 1px solid var(--gray-200);
            border-radius: 9999px;
            font-family: 'Geist Mono', monospace;
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 22px -14px var(--shadow-color);
            transition: all 0.2s ease;
        }

        .chat-button:hover {
            background: var(--gray-50);
            color: var(--ink);
            border-color: var(--gray-300);
        }

        .chat-button.hidden {
            display: none;
        }

        .chat-window {
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 360px;
            max-width: calc(100vw - 48px);
            height: 520px;
            background: var(--bg);
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            box-shadow: 0 24px 48px -12px var(--shadow-color);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 200ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: bottom right;
        }

        .chat-window.active {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .chat-header .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-title h3 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
        }

        .chat-title .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Geist Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--ink);
            border-radius: 50%;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.25;
            }
        }

        .chat-close {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-close:hover {
            color: var(--ink);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            background: var(--bg);
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 9px 9px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            display: flex;
            max-width: 80%;
        }

        .chat-message.user-message {
            align-self: flex-end;
        }

        .chat-message.ai-message {
            align-self: flex-start;
        }

        .message-content {
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.5;
        }

        .user-message .message-content {
            background: var(--ink);
            color: var(--bg);
            border-radius: 14px 14px 2px 14px;
        }

        .ai-message .message-content {
            background: var(--gray-50);
            color: var(--ink);
            border: 1px solid var(--gray-200);
            border-radius: 14px 14px 14px 2px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-4px);
            }
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: var(--bg);
            border-top: 1px solid var(--gray-200);
        }

        #chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            background: var(--gray-50);
            color: var(--ink);
            font-size: 13px;
            font-family: 'Geist Mono', monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        #chat-input::placeholder {
            color: var(--gray-400);
        }

        #chat-input:focus {
            border-color: var(--gray-400);
        }

        .send-button {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: var(--ink);
            border: none;
            color: var(--bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-button:hover {
            background: var(--gray-50);
            color: var(--ink);
            border: 1px solid var(--gray-300);
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 2px;
        }
    </style>

    <script>
        // Flowise API Configuration
        const FLOWISE_CONFIG = {
            apiUrl: 'https://cloud.flowiseai.com/api/v1/prediction',
            chatflowId: '61363f44-d50a-419a-a033-bfbf74389de3'
        };

        // Chat state
        let chatHistory = [];
        let isOpen = false;

        // DOM Elements
        const chatButton = document.getElementById('ai-chat-button');
        const chatWindow = document.getElementById('ai-chat-window');
        const chatClose = document.getElementById('chat-close');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');

        // Initialize chat widget
        function initChatWidget() {
            // Add welcome message
            addMessage('ai', "Hi! I'm Marcelo's AI assistant. Feel free to ask me about his projects, skills, or experience!");

            // Event listeners
            chatButton.addEventListener('click', toggleChat);
            chatClose.addEventListener('click', toggleChat);
            chatSend.addEventListener('click', sendMessage);

            // Send on Enter key
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Close chat when clicking outside
            document.addEventListener('click', (e) => {
                if (isOpen &&
                    !chatWindow.contains(e.target) &&
                    !chatButton.contains(e.target)) {
                    toggleChat();
                }
            });
        }

        // Toggle chat window
        function toggleChat() {
            isOpen = !isOpen;
            chatWindow.classList.toggle('active');
            chatButton.classList.toggle('hidden');

            if (isOpen) {
                chatInput.focus();
            }
        }

        // Simple markdown parser for chat messages
        function parseMarkdown(text) {
            return text
                // Bold: **text** or __text__
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.*?)__/g, '<strong>$1</strong>')
                // Italic: *text* or _text_
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/_([^_]+)_/g, '<em>$1</em>')
                // Code: `text`
                .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-size:12px;">$1</code>')
                // Line breaks
                .replace(/\n/g, '<br>')
                // Lists: - item
                .replace(/^- (.*?)(<br>|$)/gm, '<span style="display:block;padding-left:12px;">• $1</span>');
        }

        // Add message to chat
        function addMessage(sender, text, isLoading = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}-message${isLoading ? ' loading' : ''}`;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            if (isLoading) {
                messageContent.innerHTML = `
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                `;
            } else if (sender === 'ai') {
                // Parse markdown for AI messages
                messageContent.innerHTML = parseMarkdown(text);
            } else {
                // Plain text for user messages
                messageContent.textContent = text;
            }

            messageDiv.appendChild(messageContent);
            chatMessages.appendChild(messageDiv);

            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;

            return messageDiv;
        }

        // Send message to Flowise
        async function sendMessage() {
            const message = chatInput.value.trim();

            if (!message) return;

            // Add user message
            addMessage('user', message);
            chatInput.value = '';

            // Show loading indicator
            const loadingMessage = addMessage('ai', '', true);

            try {
                // Prepare request with timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000); // 30 second timeout

                console.log('Sending message to Flowise:', message);
                const response = await fetch(`${FLOWISE_CONFIG.apiUrl}/${FLOWISE_CONFIG.chatflowId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: message,
                        history: chatHistory
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // Remove loading message
                loadingMessage.remove();

                // Add AI response
                const aiResponse = data.text || data.answer || 'Sorry, I could not process that.';
                addMessage('ai', aiResponse);

                // Update chat history
                chatHistory.push({
                    role: 'user',
                    content: message
                });
                chatHistory.push({
                    role: 'assistant',
                    content: aiResponse
                });

                // Keep only last 10 messages in history to avoid token limits
                if (chatHistory.length > 20) {
                    chatHistory = chatHistory.slice(-20);
                }

            } catch (error) {
                console.error('Error sending message:', error);

                // Remove loading message
                loadingMessage.remove();

                // Show error message
                addMessage('ai', "Sorry, I'm having trouble connecting. Please try again later.");
            }
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initChatWidget);
        } else {
            initChatWidget();
        }
    </script>
</body>

</html>
